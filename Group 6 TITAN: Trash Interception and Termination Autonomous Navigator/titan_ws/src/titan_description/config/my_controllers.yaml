controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    # use_sim_time will be set to True via launch file during simulation

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    # Joint names must match your URDF exactly
    left_wheel_names: ["front_left_wheel_joint", "back_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "back_right_wheel_joint"]

    # Robot Geometry (Update these based on your physical build)
    wheel_separation: 0.35
    wheel_radius: 0.05

    # Odometry Settings
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true  # This provides the odom -> base_link transform for SLAM

    # Velocity Command Settings
    # Jazzy defaults to stamped velocity. Set to false for simple teleop
    use_stamped_vel: false 
    cmd_vel_timeout: 0.5

    # Limits (Highly recommended for 200RPM motors)
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0        # m/s
        min_velocity: -1.0
        has_acceleration_limits: true
        max_acceleration: 1.0    # m/s^2

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0        # rad/s
        min_velocity: -2.0
        has_acceleration_limits: true
        max_acceleration: 2.0    # rad/s^2